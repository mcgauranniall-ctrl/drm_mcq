<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EC4100 Derivatives & Risk Management — MCQ Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #f8fafc;
    --border: #cbd5e1;
    --accent: #2563eb;
    --accent2: #4f46e5;
    --gold: #d97706;
    --green: #059669;
    --red: #dc2626;
    --text: #1e293b;
    --muted: #64748b;
    --dimmed: #475569;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  header {
    width: 100%;
    max-width: 800px;
    padding: 3rem 2rem 1rem;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .module-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    line-height: 1.15;
    background: linear-gradient(135deg, #1e293b 30%, #4f46e5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 300;
  }

  /* Score bar */
  .scorebar {
    display: flex;
    gap: 2rem;
    justify-content: center;
    padding: 1rem 2rem;
    margin: 1.5rem 0 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
  }

  .score-item { text-align: center; }
  .score-num { font-size: 1.5rem; font-weight: 500; display: block; }
  .score-num.correct { color: var(--green); }
  .score-num.incorrect { color: var(--red); }
  .score-num.total { color: var(--accent); }
  .score-label { color: var(--muted); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; }

  /* Category badge */
  .category-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.3rem 0.75rem;
    border-radius: 999px;
    margin-bottom: 1.25rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--dimmed);
  }

  /* Main quiz card */
  main {
    width: 100%;
    max-width: 800px;
    padding: 0 2rem 4rem;
    position: relative;
    z-index: 1;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card.answered::before { opacity: 1; }

  .q-number {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
  }

  .question-text {
    font-size: 1.05rem;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 1.75rem;
    font-weight: 400;
  }

  .options { display: flex; flex-direction: column; gap: 0.75rem; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 0.9rem 1.1rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }

  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: rgba(37, 99, 235, 0.06);
    transform: translateX(3px);
  }

  .option.disabled { cursor: default; }

  .option.correct {
    border-color: var(--green);
    background: rgba(5, 150, 105, 0.09);
  }

  .option.incorrect {
    border-color: var(--red);
    background: rgba(220, 38, 38, 0.08);
  }

  .option.reveal-correct {
    border-color: var(--green);
    background: rgba(5, 150, 105, 0.05);
    opacity: 0.85;
  }

  .opt-letter {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    width: 22px;
    height: 22px;
    border-radius: 5px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.2s;
    color: var(--muted);
    background: var(--surface);
  }

  .option.correct .opt-letter {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  .option.incorrect .opt-letter {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }

  .option.reveal-correct .opt-letter {
    border-color: var(--green);
    color: var(--green);
  }

  .opt-text { font-size: 0.92rem; line-height: 1.5; }

  /* Feedback */
  .feedback {
    margin-top: 1.5rem;
    padding: 1rem 1.25rem;
    border-radius: 10px;
    font-size: 0.88rem;
    line-height: 1.55;
    display: none;
    animation: fadeSlide 0.3s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .feedback.show { display: block; }
  .feedback.correct-fb { background: rgba(5,150,105,0.08); border: 1px solid rgba(5,150,105,0.35); color: #065f46; }
  .feedback.incorrect-fb { background: rgba(220,38,38,0.07); border: 1px solid rgba(220,38,38,0.3); color: #991b1b; }

  .feedback strong { display: block; margin-bottom: 0.35rem; font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Progress */
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 999px;
    margin: 0.75rem 0 2rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 999px;
    transition: width 0.6s ease;
  }

  /* Next button */
  .btn-next {
    display: block;
    width: 100%;
    padding: 1rem;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    display: none;
  }

  .btn-next:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(99,102,241,0.35);
  }

  .btn-next.show { display: block; }

  /* Streak indicator */
  .streak {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--gold);
    margin-bottom: 1rem;
    min-height: 1.2rem;
  }

  /* Q counter decoration */
  .q-counter-deco {
    position: absolute;
    top: 1.5rem;
    right: 1.75rem;
    font-family: 'DM Serif Display', serif;
    font-size: 4rem;
    color: #e2e8f0;
    line-height: 1;
    pointer-events: none;
  }
</style>
</head>
<body>

<header>
  <div class="module-label">EC4100 · University of Galway</div>
  <h1>Derivatives &amp; Risk Management</h1>
  <p class="subtitle">Endless MCQ Practice — shuffles through all questions continuously</p>
  <div class="scorebar">
    <div class="score-item"><span class="score-num total" id="s-total">0</span><span class="score-label">Answered</span></div>
    <div class="score-item"><span class="score-num correct" id="s-correct">0</span><span class="score-label">Correct</span></div>
    <div class="score-item"><span class="score-num incorrect" id="s-incorrect">0</span><span class="score-label">Incorrect</span></div>
    <div class="score-item"><span class="score-num total" id="s-pct">—</span><span class="score-label">Score %</span></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
</header>

<main>
  <div class="streak" id="streak"></div>
  <div class="card" id="card">
    <div class="q-counter-deco" id="q-deco">01</div>
    <div class="q-number" id="q-num">QUESTION 1 OF —</div>
    <div class="category-tag" id="q-cat">Loading…</div>
    <div class="question-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
  </div>
  <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next Question →</button>
</main>

<script>
const ALL_QUESTIONS = [
  // ═══════════════════════════════════
  // FUTURES (from exam + practice sets)
  // ═══════════════════════════════════
  {
    cat: "Futures & Hedging",
    q: "A trader is hedging the sale of an asset with a short futures position. The basis (spot – futures price) increases unexpectedly. Which of the following is true?",
    opts: ["The hedger's position improves.", "The hedger's position worsens.", "The hedger's position sometimes worsens and sometimes improves.", "The hedger's position stays the same."],
    ans: 0,
    exp: "For a short hedge, an unexpected increase in basis (spot – futures) improves the hedger's position. The effective price received = spot price + gain on futures = futures price at initiation + basis at close, so a higher basis means a better effective price."
  },
  {
    cat: "Futures & Hedging",
    q: "On March 1 the price of a commodity is $1,000 and the December futures price is $1,015. On November 1, the price is $980 and the December futures price is $981. A producer of the commodity entered into a December futures contracts on March 1 to hedge the sale of the commodity on November 1. It closed out its position on November 1. What is the effective price (after taking account of hedging) received by the company?",
    opts: ["$1,016", "$1,001", "$981", "$1,014"],
    ans: 3,
    exp: "Effective price = spot price at close + gain on futures = $980 + ($1,015 − $981) = $980 + $34 = $1,014. Alternatively: futures price at initiation + basis at close = $1,015 + ($980 − $981) = $1,014."
  },
  {
    cat: "Futures & Hedging",
    q: "An exchange rate is 0.7000 and the six-month domestic and foreign risk-free interest rates are 5% and 7% (both expressed with continuous compounding). What is the six-month forward rate?",
    opts: ["0.7070", "0.7177", "0.7249", "0.6930"],
    ans: 3,
    exp: "F = S·e^(r_d – r_f)·T = 0.7000·e^(0.05–0.07)·0.5 = 0.7000·e^(–0.01) ≈ 0.6930. When domestic rates are lower than foreign rates, the forward rate is below the spot rate."
  },
  {
    cat: "Futures & Hedging",
    q: "As inventories of a commodity decline, which of the following is true?",
    opts: [
      "The one-year futures price as a percentage of the spot price increases.",
      "The one-year futures price as a percentage of the spot price decreases.",
      "The one-year futures price as a percentage of the spot price stays the same.",
      "Any of the above can happen."
    ],
    ans: 1,
    exp: "When inventories decline, the convenience yield increases. A higher convenience yield lowers the futures price relative to the spot price, so the futures price as a percentage of the spot price decreases."
  },
  {
    cat: "Futures & Hedging",
    q: "What is the primary difference between an initial margin and a variation margin in futures trading?",
    opts: [
      "Initial margin is the profit or loss on a futures position, while variation margin is the deposit made to open a position.",
      "Initial margin is a non-refundable fee paid to brokers, while variation margin is the daily adjustment of profits and losses.",
      "Initial margin is the deposit required to open a futures position, while variation margin is the additional funds required to maintain the position if it moves against the trader.",
      "Initial margin and variation margin are both terms for the profit gained from a futures contract."
    ],
    ans: 2,
    exp: "Initial margin is the security deposit required to open a futures position. Variation (maintenance) margin is the additional funds required if the margin account falls below the maintenance margin level due to adverse price movements."
  },
  {
    cat: "Futures & Hedging",
    q: "A trader has a portfolio worth €5 million that mirrors the performance of a stock index. The stock index is currently 1,250. Futures contracts trade on the index with one contract being on 250 times the index. To remove market risk from the portfolio the trader should:",
    opts: ["Buy 16 contracts", "Sell 16 contracts", "Buy 20 contracts", "Sell 20 contracts"],
    ans: 1,
    exp: "Value of one futures contract = 1,250 × 250 = $312,500. Number of contracts = €5,000,000 / $312,500 = 16. To hedge (remove market risk), the trader takes an offsetting short position — sell 16 contracts."
  },
  {
    cat: "Futures & Hedging",
    q: "Which of the following best describes 'stack and roll'?",
    opts: [
      "Creates long-term hedges from short-term futures contracts",
      "Can avoid losses on futures contracts by entering into further futures contracts",
      "Involves buying a futures contract with one maturity and selling a futures contract with a different maturity",
      "Involves two different exposures simultaneously"
    ],
    ans: 0,
    exp: "Stack and roll involves entering into short-maturity futures contracts and rolling them over as they approach maturity. This process creates long-term hedges from a series of short-term futures contracts."
  },
  {
    cat: "Futures & Hedging",
    q: "Which of the following is true about the convenience yield?",
    opts: [
      "The convenience yield is always positive or zero.",
      "The convenience yield is always positive for an investment asset.",
      "The convenience yield is always negative for a consumption asset.",
      "The convenience yield measures the average return earned by holding futures contracts."
    ],
    ans: 0,
    exp: "The convenience yield is always non-negative. It represents the non-monetary benefit of holding a physical commodity rather than a futures contract. It is associated mainly with consumption assets, not investment assets."
  },
  {
    cat: "Futures & Hedging",
    q: "Which of the following is a pure consumption asset?",
    opts: ["The S&P 500 index", "The Canadian dollar", "Copper", "Amazon stock"],
    ans: 2,
    exp: "Copper is a pure consumption asset — it is used in manufacturing and industry, not primarily held for investment. The S&P 500 index, Canadian dollar, and Amazon stock are investment assets."
  },
  {
    cat: "Futures & Hedging",
    q: "The frequency with which futures margin accounts are adjusted for gains and losses is:",
    opts: ["Daily", "Weekly", "Monthly", "Quarterly"],
    ans: 0,
    exp: "Futures margin accounts are marked-to-market daily. Gains and losses are settled every day through the margin account."
  },
  {
    cat: "Futures & Hedging",
    q: "You go long one November futures contract on CME when the futures price is $1,020 per unit. Each contract is on 50 units and the initial margin per contract is $2,500. The maintenance margin is $2,000. The next day the futures price rises to $1,025 per unit. What is the balance of your margin account at the end of the day?",
    opts: ["$2,200", "$2,500", "$2,750", "$3,050"],
    ans: 2,
    exp: "Gain per unit = $1,025 − $1,020 = $5. Total gain = $5 × 50 = $250. New margin balance = $2,500 + $250 = $2,750."
  },
  {
    cat: "Futures & Hedging",
    q: "Which of the following is NOT true?",
    opts: [
      "Gold and silver are investment assets",
      "Investment assets are held by significant numbers of investors for investment purposes",
      "Investment assets are never held for consumption",
      "The forward price of an investment asset can be obtained from the spot price, interest rates, and the income paid on the asset"
    ],
    ans: 2,
    exp: "Investment assets CAN be held for consumption (silver is an example). An asset qualifies as an investment asset if it is held for investment by at least some traders — it doesn't have to be held exclusively for investment."
  },
  {
    cat: "Futures & Hedging",
    q: "Which of the following describes contango?",
    opts: [
      "The futures price is below the expected future spot price",
      "The futures price is below today's spot price",
      "The futures price is a declining function of the time to maturity",
      "The futures price is above the expected future spot price"
    ],
    ans: 3,
    exp: "Contango is when the futures price exceeds the expected future spot price. It can also refer to futures price exceeding today's spot price (normal market condition)."
  },
  {
    cat: "Futures & Hedging",
    q: "Which of the following is an argument used by Keynes and Hicks?",
    opts: [
      "If hedgers hold short positions and speculators hold long positions, the futures price will tend to be higher than the expected future spot price",
      "If hedgers hold short positions and speculators hold long positions, the futures price will tend to be lower than the expected future spot price",
      "If hedgers hold long positions and speculators hold short positions, the futures price will tend to be lower than today's spot price",
      "If hedgers hold long positions and speculators hold short positions, the futures price will tend to be higher than today's spot price"
    ],
    ans: 1,
    exp: "Keynes and Hicks (theory of normal backwardation): risk-averse hedgers pay speculators a risk premium. When hedgers are short and speculators are long, the futures price is set below the expected future spot price so that speculators earn a positive expected return."
  },
  {
    cat: "Futures & Hedging",
    q: "Which of the following is NOT true about forward and futures contracts?",
    opts: [
      "Forward contracts are more liquid than futures contracts",
      "Futures contracts are traded on exchanges while forward contracts are traded in the over-the-counter market",
      "In theory, forward prices and futures prices are equal when there is no uncertainty about future interest rates",
      "Taxes and transaction costs can lead to forward and futures prices being different"
    ],
    ans: 0,
    exp: "Futures contracts are exchange-traded and standardised, giving them greater liquidity than forwards, which are private OTC agreements with no secondary market."
  },
  {
    cat: "Futures & Hedging",
    q: "The spot price of an investment asset that provides no income is €30 and the risk-free rate for all maturities (with continuous compounding) is 10%. What is the three-year forward price?",
    opts: ["40.50", "22.22", "33.00", "33.16"],
    ans: 0,
    exp: "F = S·e^(rT) = 30·e^(0.10×3) = 30·e^0.30 = 30 × 1.3499 ≈ 40.50. The answer is A. (Note: D 33.16 would be for T=1 at 10%: 30e^0.1=33.16.)"
  },
  {
    cat: "Futures & Hedging",
    q: "A US trader has a $36 million portfolio with a beta of 1.2. The futures price for a contract on an index is 900. Futures contracts on $250 times the index can be traded. What trade is necessary to increase beta to 1.8?",
    opts: ["Long 192 contracts", "Short 192 contracts", "Long 96 contracts", "Short 96 contracts"],
    ans: 2,
    exp: "Number of contracts = (β_target − β_portfolio) × Portfolio Value / (Futures price × Contract multiplier) = (1.8 − 1.2) × 36,000,000 / (900 × 250) = 0.6 × 36,000,000 / 225,000 = 96. To increase beta, go long 96 contracts."
  },
  {
    cat: "Futures & Hedging",
    q: "Which of the following increases basis risk?",
    opts: [
      "A large difference between the futures prices when the hedge is put in place and when it is closed out",
      "Dissimilarity between the underlying asset of the futures contract and the hedger's exposure",
      "A reduction in the time between the date when the futures contract is closed and its delivery month",
      "None of the above"
    ],
    ans: 1,
    exp: "Basis risk increases when the underlying asset of the futures contract differs from the asset being hedged (cross-hedging). Dissimilarity means the price movements may diverge unpredictably."
  },
  {
    cat: "Futures & Hedging",
    q: "Suppose that the standard deviation of monthly changes in the price of commodity A is 2. The standard deviation of monthly changes in a futures price for a contract on commodity B (similar to A) is 3. The correlation between the futures price and the commodity price is 0.9. What hedge ratio should be used?",
    opts: ["0.60", "0.67", "1.45", "0.90"],
    ans: 0,
    exp: "Optimal hedge ratio h* = ρ × (σ_S / σ_F) = 0.9 × (2/3) = 0.9 × 0.667 = 0.60."
  },
  {
    cat: "Futures & Hedging",
    q: "What is the primary purpose of margin requirements in futures contracts?",
    opts: [
      "To increase the cost of trading",
      "To ensure contract fulfilment",
      "To limit the number of participants",
      "To determine the contract size"
    ],
    ans: 1,
    exp: "Margin requirements reduce counterparty credit risk and ensure that parties can fulfil their contractual obligations by providing a financial buffer."
  },
  {
    cat: "Futures & Hedging",
    q: "Which of the following best describes a long hedge in futures markets?",
    opts: [
      "Selling futures to protect against falling prices",
      "Buying futures to protect against rising prices",
      "Selling futures to speculate on rising prices",
      "Buying futures to speculate on falling prices"
    ],
    ans: 1,
    exp: "A long hedge involves buying futures contracts to protect against a rise in prices. It is appropriate when a party knows they will need to purchase an asset in the future and wants to lock in the current price."
  },
  {
    cat: "Futures & Hedging",
    q: "If the initial margin requirement for a futures contract is $1,000 and the maintenance margin is $700, what is the margin call amount if the margin account falls to $650?",
    opts: ["$50", "$100", "$350", "$400"],
    ans: 2,
    exp: "A margin call requires the account to be topped back up to the initial margin level: $1,000 − $650 = $350."
  },
  {
    cat: "Futures & Hedging",
    q: "Which of the following is a key difference between futures and forwards contracts?",
    opts: [
      "Forwards are typically traded on exchanges, while futures are not",
      "Futures require margin, whereas forwards typically do not",
      "Futures have unlimited liability, whereas forwards have limited liability",
      "Forwards can be customized, while futures cannot"
    ],
    ans: 1,
    exp: "Futures are exchange-traded and require margin deposits. Forwards are OTC customised contracts that typically do not require margin. Both futures and forwards can be customised to varying degrees."
  },
  // ═══════════════════════════════════
  // OPTIONS
  // ═══════════════════════════════════
  {
    cat: "Options",
    q: "The price of a stock, which pays no dividends, is €30 and the strike price of a one-year European call option on the stock is €25. The risk-free rate is 4% (continuously compounded). Which of the following is a lower bound for the option such that there are arbitrage opportunities if the price is below the lower bound?",
    opts: ["€5.00", "€5.98", "€4.98", "€3.98"],
    ans: 1,
    exp: "Lower bound for a European call: max(S₀ − Ke^(−rT), 0) = max(30 − 25·e^(−0.04×1), 0) = max(30 − 25×0.9608, 0) = max(30 − 24.02, 0) = €5.98."
  },
  {
    cat: "Options",
    q: "When volatility increases with all else remaining the same, which of the following is true?",
    opts: [
      "Both calls and puts increase in value.",
      "Both calls and puts decrease in value.",
      "Calls increase in value while puts decrease in value.",
      "Puts increase in value while calls decrease in value."

// ── State ──────────────────────────────────────────────
let queue = [];
let currentQ = null;
let totalAnswered = 0;
let totalCorrect = 0;
let streak = 0;
let qIndex = 0; // position within the current shuffled round

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function refillQueue() {
  queue = shuffle(ALL_QUESTIONS);
  qIndex = 0;
}

function nextQuestion() {
  if (qIndex >= queue.length) refillQueue();
  currentQ = queue[qIndex++];

  // Reset UI
  const card = document.getElementById('card');
  card.classList.remove('answered');

  document.getElementById('q-num').textContent =
    `QUESTION ${totalAnswered + 1} — ${currentQ.cat.toUpperCase()}`;
  document.getElementById('q-cat').textContent = currentQ.cat;
  document.getElementById('q-deco').textContent =
    String(totalAnswered + 1).padStart(2, '0');
  document.getElementById('q-text').textContent = currentQ.q;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';

  const letters = ['A', 'B', 'C', 'D', 'E'];
  currentQ.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span class="opt-text">${opt}</span>`;
    btn.addEventListener('click', () => handleAnswer(i));
    optDiv.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';

  const btn = document.getElementById('btn-next');
  btn.classList.remove('show');

  // Update progress (% through current round)
  const pct = Math.round((qIndex / ALL_QUESTIONS.length) * 100);
  document.getElementById('progress').style.width = pct + '%';

  updateStreak();
}

function handleAnswer(chosen) {
  const options = document.querySelectorAll('.option');
  options.forEach(o => { o.classList.add('disabled'); o.style.pointerEvents = 'none'; });

  const correct = currentQ.ans;
  const isCorrect = chosen === correct;

  options[chosen].classList.add(isCorrect ? 'correct' : 'incorrect');
  if (!isCorrect) options[correct].classList.add('reveal-correct');

  const fb = document.getElementById('feedback');
  fb.className = `feedback ${isCorrect ? 'correct-fb' : 'incorrect-fb'} show`;
  fb.innerHTML = `<strong>${isCorrect ? '✓ Correct!' : '✗ Incorrect'}</strong>${currentQ.exp}`;

  totalAnswered++;
  if (isCorrect) { totalCorrect++; streak++; } else { streak = 0; }

  document.getElementById('s-total').textContent = totalAnswered;
  document.getElementById('s-correct').textContent = totalCorrect;
  document.getElementById('s-incorrect').textContent = totalAnswered - totalCorrect;
  document.getElementById('s-pct').textContent =
    Math.round((totalCorrect / totalAnswered) * 100) + '%';

  updateStreak();
  document.getElementById('card').classList.add('answered');
  document.getElementById('btn-next').classList.add('show');
}

function updateStreak() {
  const el = document.getElementById('streak');
  if (streak >= 3) {
    const emojis = streak >= 10 ? '🔥🔥🔥' : streak >= 7 ? '🔥🔥' : '🔥';
    el.textContent = `${emojis} ${streak}-question streak!`;
  } else {
    el.textContent = '';
  }
}

// Kick off
refillQueue();
nextQuestion();
</script>
